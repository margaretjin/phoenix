<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피닉스 - 메인</title>
    <meta property="og:title" content="피닉스" />
    <meta property="og:description" content="혈맹원 정보를 검색해보세요." />
    <meta property="og:image" content="https://phoenix-mmtl.onrender.com/static/phoenix.jpg" />
    <meta property="og:url" content="https://phoenix-mmtl.onrender.com" />
    <!-- 외부 스타일시트 연결 -->
    <link rel="stylesheet" href="./static/style.css?v=20260715-3">
</head>
<body>
    <div class="container menu-container">
        <div class="menu-buttons">
            <a href="/" class="menu-btn home-btn active">🏠 홈</a>
            <a href="kurtz.html" class="menu-btn">커츠</a>
            <a href="fire.html" class="menu-btn">화둥</a>
            <a href="dragon.html" class="menu-btn">용계</a>
            <a href="#" onclick="downloadPhoenixImage(); return false;" class="menu-btn">사진</a>
    </div>

    <div class="container">
        <h1>린델 피닉스</h1>
        <div class="search">
            <input id="searchInput" type="text" placeholder="아이디를 입력하세요">
            <button onclick="searchUser()">검색</button>
        </div>

        <div class="bloodline-section">
            <!-- 공통 클래스 card-grid 적용 -->
            <div id="bloodlineList" class="card-grid"></div>
        </div>
     
    <!-- 💡 검색 결과 카드 영역 (기여도 및 기간 점수 완벽 적용) -->
        <div id="card" class="card search-result-card" style="display: none;">
            <div class="item"><span class="label">아이디</span><span class="value" id="name"></span></div>
            <div class="item"><span class="label">직업</span><span class="value" id="job"></span></div>
            <div class="item"><span class="label">혈맹</span><span class="value" id="blood"></span></div>
            <div class="item"><span class="label">공성혈</span><span class="value" id="blood_member"></span></div>
            
            <hr style="border: 0; border-top: 1px dashed #555; margin: 14px 0;">
            <div class="item"><span class="label" style="color: #00ff88;">💎 총 분배금</span><span class="value" id="total_dist_gold" style="color: #00ff88; font-weight: bold;">0 아데나</span></div>     
            <div class="item"><span class="label" style="color: #4facfe;">📊 기여도</span><span class="value" id="contrib_rate" style="color: #4facfe; font-weight: bold;">0.00 %</span></div>
            <div class="item"><span class="label" style="color: #ffd700;">💰 받을 분배금</span><span class="value" id="dist_gold" style="color: #ffd700; font-weight: bold;">0 아데나</span></div>
            <div class="item"><span class="label">⚔️ 오늘 보스탐 참여횟수</span><span class="value" id="today_cnt">0 회</span></div>
            <div class="item"><span class="label">⭐ 오늘 보스탐 참여점수</span><span class="value" id="today_pts">0 점</span></div>
            <div class="item"><span class="label" id="label_d_period">📅 1주간 참여점수</span><span class="value" id="d_period_pts">0 점</span></div>
            <div class="item"><span class="label" id="label_c_period">📅 2주간 참여점수</span><span class="value" id="c_period_pts">0 점</span></div>
        </div>
        <div id="error" class="error-message" style="display: none;"></div>

        <div id="statusArea" class="card status-area" style="display: none;">
            <div id="remainingText" class="remaining-text"></div>
            
            <div id="memberListBox" class="member-list-box">
                <div id="memberListContent" class="member-grid"></div>
            </div>
        </div>
    </div>

    <!-- 📱 모바일 이미지 저장 전용 모달 영역 -->
    <div id="downloadModal" class="download-modal">
        <p class="download-modal-text">
            <strong>💡 사진첩 저장 안내</strong><br>
            아래 이미지를 <strong>길게 꾹~ 누르신 후</strong><br>
            [내 사진첩에 저장] 또는 [이미지 저장]을 선택해주세요!
        </p>
        <img src="/static/phoenix.jpg" alt="피닉스 이미지">
        <button class="download-modal-close" onclick="closeDownloadModal()">닫기</button>
    </div>

    <script>
        /* 전역 변수 설정 (조회된 혈맹원 명단 저장용) */
        window.currentBloodlineMembers = []; 

        const input = document.getElementById("searchInput");
        
        /* 군주 직업군 클래스 매핑 */
        const memberJobClassMap = {
            "군주": "member-job-monarch",
            "기사": "member-job-knight",
            "요정": "member-job-elf",
            "법사": "member-job-mage"
        };
        
        input.addEventListener("keydown", function(e) { 
            if (e.key === "Enter") { searchUser(); } 
        });

        async function loadBloodlineList() {
            try {
                const res = await fetch("/bloodlines");
                const data = await res.json();
                const listEl = document.getElementById("bloodlineList");
                if (!listEl) return;

                const bloodlines = Array.isArray(data.bloodlines) ? data.bloodlines : [];
                /* 공통 버튼 클래스 grid-card-btn 및 텍스트 span 클래스 grid-card-btn-name 적용 */
                listEl.innerHTML = bloodlines.map(name => `
                    <button class="grid-card-btn" type="button" title="${name}" onclick="fetchBloodlineStatus('${name.replace(/'/g, "\\'")}')">
                        <span class="grid-card-btn-name">${name}</span>
                    </button>
                `).join('');
            } catch (e) {
                console.error("혈 목록 로드 실패", e);
            }
        }

        loadBloodlineList();
/* 🔍 유저 검색 함수 (총 분배금 렌더링 추가) */
        async function searchUser() {
            const keyword = input.value.trim();
            if (keyword === "") { alert("아이디를 입력하세요."); return; }
            
            const card = document.getElementById("card");
            const error = document.getElementById("error");
            
            try {
                const res = await fetch("/search/" + encodeURIComponent(keyword));
                const data = await res.json();
                if (!res.ok) { throw new Error(data.detail); }
                
                // 1. 인적 정보 출력
                document.getElementById("name").innerText = data.name;
                document.getElementById("job").innerText = data.character_class;
                document.getElementById("blood").innerText = data.bloodline;
                document.getElementById("blood_member").innerText = data.blood_member;
                
                // 2. 서버에서 산출한 통계 및 분배금 출력
                const stats = data.attendance_stats || {};
                
                // 💡 [추가됨] 총 분배금 출력
                document.getElementById("total_dist_gold").innerText = (stats.total_distribution_gold || 0).toLocaleString() + " 아데나";
                document.getElementById("contrib_rate").innerText = (stats.contribution_rate || 0).toFixed(2) + " %";
                document.getElementById("dist_gold").innerText = (stats.distribution_gold || 0).toLocaleString() + " 아데나";
                
                document.getElementById("today_cnt").innerText = (stats.today_count || 0) + " 회";
                document.getElementById("today_pts").innerText = (stats.today_points || 0) + " 점";
                
                // D2~D3 날짜 라벨 및 점수
                if (stats.d_period_label) {
                    document.getElementById("label_d_period").innerText = `${stats.d_period_label} 참여점수`;
                }
                document.getElementById("d_period_pts").innerText = (stats.d_period_points || 0) + " 점";
                
                // C2~C3 날짜 라벨 및 점수
                if (stats.c_period_label) {
                    document.getElementById("label_c_period").innerText = `${stats.c_period_label} 참여점수`;
                }
                document.getElementById("c_period_pts").innerText = (stats.c_period_points || 0) + " 점";
                
                card.style.display = "block"; 
                error.style.display = "none";

                /* 하단 명단 현황 업데이트 */
                const targetBloodline = data.bloodline || data.blood_member;
                if (targetBloodline) {
                    fetchBloodlineStatus(targetBloodline);
                } else {
                    document.getElementById("statusArea").style.display = "none";
                }
            } catch (err) {
                card.style.display = "none"; 
                document.getElementById("statusArea").style.display = "none";
                error.style.display = "block"; 
                error.innerText = err.message;
            }
        }
        /* 🔄 혈맹의 인원 현황 및 명단을 서버에서 로드하는 함수 */
        async function fetchBloodlineStatus(bloodlineName) {
            if (!bloodlineName || bloodlineName === "undefined" || bloodlineName === "없음") return;
            
            try {
                const res = await fetch("/members/" + encodeURIComponent(bloodlineName));
                const data = await res.json();
                
                window.currentBloodlineMembers = Array.isArray(data.members) ? data.members : [];
                const currentCount = window.currentBloodlineMembers.length;
                const remaining = data.remaining;
                
                /* 텍스트 조건부 구성 (40명 꽉 찼을 때 vs 자리가 남았을 때) */
                const titleEl = document.getElementById("remainingText");
                if (remaining <= 0) {
                    titleEl.innerHTML = `📢 <span class="bloodline-name">[${data.bloodline}]</span> 혈맹 총 ${currentCount}명`;
                } else {
                    titleEl.innerHTML = `📢 <span class="bloodline-name">[${data.bloodline}]</span> 혈맹 총 ${currentCount}명 <span class="status-success">${remaining}자리가 남았습니다.</span>`;
                }
                
                const contentEl = document.getElementById("memberListContent");
                
                /* 군주를 최상단 정렬 규칙에 배치 */
                const groups = [
                    { label: "군주", members: window.currentBloodlineMembers.filter(m => (m.job || "").trim() === "군주") },
                    { label: "기사", members: window.currentBloodlineMembers.filter(m => (m.job || "").trim() === "기사") },
                    { label: "요정", members: window.currentBloodlineMembers.filter(m => (m.job || "").trim() === "요정") },
                    { label: "법사", members: window.currentBloodlineMembers.filter(m => (m.job || "").trim() === "법사") }
                ];

                contentEl.innerHTML = groups.map(group => {
                    if (!group.members.length) return "";
                    
                    /* 공통 클래스 grid-card-btn 및 자식 span 클래스 grid-card-btn-name 적용 */
                    const cards = group.members.map(member => {
                        const fullName = member.id || member.name || "";
                        const truncated = fullName.length > 5 ? fullName.slice(0, 5) + "..." : fullName;
                        const jobClass = memberJobClassMap[group.label] || "";
                        return `
                            <button class="grid-card-btn ${jobClass}" type="button" data-full-name="${fullName}" data-truncated-name="${truncated}">
                                <span class="grid-card-btn-name">${truncated}</span>
                            </button>
                        `;
                    }).join('');

                    return `
                        <div class="member-group">
                            <div class="member-group-label">${group.label} <span class="member-group-count">(${group.members.length}명)</span></div>
                            <!-- 공통 클래스 card-grid 적용 -->
                            <div class="card-grid">${cards}</div>
                        </div>
                    `;
                }).join('');

                /* 선택자 .grid-card-btn 및 .grid-card-btn-name으로 매핑 업데이트 */
                contentEl.querySelectorAll('.grid-card-btn').forEach(item => {
                    item.addEventListener('click', () => {
                        const expanded = item.dataset.expanded === 'true';
                        const fullName = item.dataset.fullName || '';
                        const truncated = item.dataset.truncatedName || '';
                        item.dataset.expanded = expanded ? 'false' : 'true';
                        item.querySelector('.grid-card-btn-name').textContent = expanded ? truncated : fullName;
                    });
                });
                
                /* 명단 박스를 화면에 표시 */
                document.getElementById("statusArea").style.display = "block";
            } catch (e) {
                console.error("혈맹 정보 로드 실패", e);
            }
        }

        /* 💾 모바일 및 PC 대응 다운로드 처리 함수 */
        function downloadPhoenixImage() {
            const isMobile = /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isKakaotalk = /KAKAOTALK/i.test(navigator.userAgent);
            
            if (isMobile || isKakaotalk) {
                // 모바일 환경일 경우 직접 누르는 저장이 차단되기 쉬우므로 안내 모달창을 띄워줌
                document.getElementById("downloadModal").style.display = "flex";
            } else {
                // 일반 PC 브라우저일 경우 강제 백그라운드 다운로드 실행
                const imageUrl = "/static/phoenix.jpg";
                fetch(imageUrl)
                    .then(response => {
                        if (!response.ok) throw new Error();
                        return response.blob();
                    })
                    .then(blob => {
                        const blobUrl = window.URL.createObjectURL(blob);
                        const link = document.createElement("a");
                        link.href = blobUrl;
                        link.download = "phoenix.jpg";
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        window.URL.revokeObjectURL(blobUrl);
                    })
                    .catch(() => {
                        // 만약 PC 브라우저인데도 다운로드가 실패할 경우 차선책으로 모달창을 열어줌
                        document.getElementById("downloadModal").style.display = "flex";
                    });
            }
        }

        /* 모달 닫기 */
        function closeDownloadModal() {
            document.getElementById("downloadModal").style.display = "none";
        }
    </script>
</body>
</html>
